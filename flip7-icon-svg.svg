<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Subtle paper texture gradient -->
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5e1"/>
      <stop offset="100%" stop-color="#fceedb"/>
    </linearGradient>
    <!-- Rainbow stripes for the fan ornaments -->
    <linearGradient id="fanRainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="20%" stop-color="#ff7a1a"/>
      <stop offset="40%" stop-color="#ffd23f"/>
      <stop offset="60%" stop-color="#6fcf3c"/>
      <stop offset="80%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#8338ec"/>
    </linearGradient>
  </defs>

  <!-- Cream rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#paperGrad)"/>

  <!-- Outer black border (chunky pop-art frame) -->
  <rect x="22" y="22" width="468" height="468" rx="92" fill="none" stroke="#1a1a1a" stroke-width="14"/>

  <!-- Inner gold border for that ticket-stub feel -->
  <rect x="50" y="50" width="412" height="412" rx="68" fill="none" stroke="#d9a800" stroke-width="6" stroke-dasharray="2 0"/>

  <!-- Top-left fan ornament (rainbow rays) -->
  <g transform="translate(80, 80) rotate(-45)">
    <path d="M 0 0 L 90 -30 L 90 30 Z" fill="#e63946" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 92 -10 L 92 10 Z" fill="#ffd23f" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 88 12 L 80 35 Z" fill="#6fcf3c" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 75 38 L 60 55 Z" fill="#3a86ff" stroke="#1a1a1a" stroke-width="4"/>
  </g>

  <!-- Bottom-right fan ornament (mirrored) -->
  <g transform="translate(432, 432) rotate(135)">
    <path d="M 0 0 L 90 -30 L 90 30 Z" fill="#e63946" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 92 -10 L 92 10 Z" fill="#ffd23f" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 88 12 L 80 35 Z" fill="#6fcf3c" stroke="#1a1a1a" stroke-width="4"/>
    <path d="M 0 0 L 75 38 L 60 55 Z" fill="#3a86ff" stroke="#1a1a1a" stroke-width="4"/>
  </g>

  <!-- Center: bold italic 7 with multi-layer outline effect -->
  <!-- Yellow drop shadow layer (offset down-right) -->
  <text x="270" y="372"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="900"
        font-size="380"
        text-anchor="middle"
        fill="#ffd23f"
        stroke="#1a1a1a"
        stroke-width="8"
        paint-order="stroke fill">7</text>

  <!-- Main red 7 on top -->
  <text x="256" y="358"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="900"
        font-size="380"
        text-anchor="middle"
        fill="#e63946"
        stroke="#1a1a1a"
        stroke-width="8"
        paint-order="stroke fill">7</text>

  <!-- Tiny "FLIP" label arc above the 7 -->
  <g transform="translate(256, 122)">
    <rect x="-72" y="-22" width="144" height="44" rx="22" fill="#1a1a1a"/>
    <text x="0" y="9"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-weight="900"
          font-size="26"
          letter-spacing="6"
          text-anchor="middle"
          fill="#fef9f0">FLIP</text>
  </g>
</svg>
